name: Publish to PyPI

on:
  release:
    types: [published] # Triggers only when you officially create a new release on GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # This block is crucial for modern, secure, passwordless publishing to PyPI
    permissions:
      id-token: write  # Required for trusted publishing authentication
      contents: read

    steps:
    - name: Check out repository source code
      uses: actions/checkout@v4

    - name: Install uv package manager
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python environment
      run: uv python install 3.12

    - name: Build Source and Wheel Distributions
      # uv build automatically generates clean .tar.gz and .whl files into the dist/ folder
      run: uv build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1